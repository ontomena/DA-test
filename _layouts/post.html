---
layout: default
---

<a href="{{ '/commentarium/' | relative_url }}" class="back-link">← Back to commentarium</a>

<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <span class="post-categories">
        {% for category in page.categories %}
          {{ category | capitalize }}{% unless forloop.last %}, {% endunless %}
        {% endfor %}
      </span>
      <span> · {{ page.date | date: "%d %b %Y" }}</span>
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>

<a href="{{ '/commentarium/' | relative_url }}" class="back-link">← Back to commentarium</a>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header>
    <div class="header-content">
      <h1 class="site-title">
        <a href="{{ '/' | relative_url }}">DisplacementActivities</a>
      </h1>
    </div>
  </header>
  
  <img src="{{ '/assets/images/piano-strip230.jpg' | relative_url }}" alt="" class="site-header-image">
  
  <nav>
    <ul>
      <li><a href="{{ '/' | relative_url }}">home</a></li>
      <li><a href="{{ '/commentarium/' | relative_url }}">commentarium</a></li>
      <li><a href="{{ '/video/' | relative_url }}">video</a></li>
      <li><a href="{{ '/sound/' | relative_url }}">sound</a></li>
      <li><a href="{{ '/index-page/' | relative_url }}">index</a></li>
      <li><a href="{{ '/contact/' | relative_url }}">contact</a></li>
    </ul>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer>
    <p>© DA 2026</p>
  </footer>
  <script src="{{ '/assets/js/sticky-smooth.js' | relative_url }}"></script>
</body>
</html>
